name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NIXPKGS: github:NixOS/nixpkgs/cc0fcdd5874deabbdb54fa54ad0df957f3f04c52
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Set blogroll cache date
        id: blogroll-cache-date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
      - name: Cache blogroll data
        uses: actions/cache@v5
        with:
          path: data/blogroll.json
          key: blogroll-data-${{ steps.blogroll-cache-date.outputs.date }}
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: nix run "$NIXPKGS#just" -- build "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
